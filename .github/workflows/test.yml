name: Test

on:
  push:
    branches: [main, jim-finally-bmad]
  pull_request:
    branches: [main, jim-finally-bmad]

jobs:
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Test
        run: uv run pytest -v --cov=app --cov-report=term-missing
        env:
          LLM_MOCK: "true"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t finally:ci .
